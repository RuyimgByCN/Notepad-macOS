name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from upstream
        id: version
        run: |
          # Read version from upstream notepad-plus-plus resource.h
          RESOURCE_H="upstream/notepad-plus-plus/PowerEditor/src/resource.h"
          NPP_VER=$(grep 'VERSION_PRODUCT_VALUE' "$RESOURCE_H" \
            | sed 's/.*L"\(.*\)\\0".*/\1/')
          # Fall back to git tag if resource.h not found or unparseable
          if [[ -z "$NPP_VER" ]]; then
            TAG="${GITHUB_REF_NAME}"
            NPP_VER="${TAG#v}"
          fi
          echo "version=$NPP_VER" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # upstream/notepad-plus-plus is not tracked in this repo (it is the full
      # Notepad++ tree). Fetch it at the pinned commit the app is built against
      # and re-apply our macOS LexUser patch so the build scripts find the
      # Scintilla/Lexilla sources. Runs AFTER version extraction so the release
      # version comes from the git tag, not upstream resource.h.
      - name: Restore upstream Notepad++ source
        run: |
          NPP_COMMIT="75186d90307d033da95323f79ace87ff8d331a44"
          git clone --filter=blob:none \
            https://github.com/notepad-plus-plus/notepad-plus-plus.git \
            upstream/notepad-plus-plus
          git -C upstream/notepad-plus-plus checkout --detach "$NPP_COMMIT"
          cp patches/lexilla/LexUser.cxx \
            upstream/notepad-plus-plus/lexilla/lexers/LexUser.cxx

      - name: Build Scintilla framework
        run: scripts/build-scintilla-framework.sh

      - name: Build Lexilla dylib (universal)
        env:
          MACOS_LEXILLA_ARCHS: "arm64 x86_64"
        run: scripts/build-lexilla-dylib.sh

      - name: Package macOS app
        env:
          MACOS_APP_VERSION: ${{ steps.version.outputs.version }}
          # Ad-hoc signing for CI; set MACOS_CODESIGN_IDENTITY
          # to a Developer ID identity for distributable builds.
          MACOS_CODESIGN_IDENTITY: "-"
        run: scripts/package-macos.sh

      - name: Rename DMG for release
        run: |
          mv "dist/Notepad++ Mac.dmg" \
             "dist/Notepad-macOS-${{ steps.version.outputs.version }}.dmg"

      - name: Compute SHA-256
        id: sha
        run: |
          SHA=$(shasum -a 256 "dist/Notepad-macOS-${{ steps.version.outputs.version }}.dmg" | cut -d ' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          # Collect commits since the last release tag (or all if first release)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            COMMITS=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          SHA="${{ steps.sha.outputs.sha256 }}"
          VER="${{ steps.version.outputs.version }}"

          cat > /tmp/release-notes.md <<RELEASEEOF
          ## What's Changed

          $COMMITS

          ---

          **SHA-256:** \`${SHA}\`

          | File | Architecture |
          |------|--------------|
          | Notepad-macOS-${VER}.dmg | arm64 (Apple Silicon) + x86_64 (Intel) — Universal |
          RELEASEEOF
          echo "path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Notepad-macOS ${{ steps.version.outputs.version }}
          body_path: /tmp/release-notes.md
          files: |
            dist/Notepad-macOS-${{ steps.version.outputs.version }}.dmg